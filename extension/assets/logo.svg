<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c4dff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14142b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="url(#glow)" stroke-width="6"/>
  
  <!-- Synthetic user silhouette (stylized) -->
  <g transform="translate(256, 200)">
    <!-- Head -->
    <circle cx="0" cy="-40" r="45" stroke="url(#glow)" stroke-width="5" fill="none" opacity="0.9"/>
    <!-- Body arc -->
    <path d="M-70 50 Q-70 0 -30 -5 Q0 -8 30 -5 Q70 0 70 50" stroke="url(#glow)" stroke-width="5" fill="none" opacity="0.9"/>
  </g>
  
  <!-- Scan lines (UX audit visual) -->
  <g opacity="0.4" stroke="#00e5ff" stroke-width="2">
    <line x1="130" y1="300" x2="382" y2="300" stroke-dasharray="8 4"/>
    <line x1="140" y1="325" x2="372" y2="325" stroke-dasharray="8 4"/>
    <line x1="150" y1="350" x2="362" y2="350" stroke-dasharray="8 4"/>
    <line x1="160" y1="375" x2="352" y2="375" stroke-dasharray="8 4"/>
  </g>
  
  <!-- Checkmark accents -->
  <g transform="translate(340, 305)" opacity="0.8">
    <polyline points="0,8 6,14 16,0" stroke="#00e5ff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(340, 355)" opacity="0.8">
    <polyline points="0,8 6,14 16,0" stroke="#ff4081" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- AI sparkle -->
  <g transform="translate(370, 170)" opacity="0.7">
    <path d="M0,-12 L3,-3 L12,0 L3,3 L0,12 L-3,3 L-12,0 L-3,-3 Z" fill="#00e5ff"/>
  </g>
  <g transform="translate(150, 150)" opacity="0.5">
    <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z" fill="#7c4dff"/>
  </g>
</svg>
